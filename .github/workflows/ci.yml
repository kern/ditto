name: CI

on:
  push:
    branches: [master, main, 'claude/**']
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  swiftformat:
    name: SwiftFormat
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftFormat
        run: swiftformat . --verbose 2>&1 | tail -100

      - name: Check for changes
        run: |
          if ! git diff --quiet; then
            echo "::group::Files that need formatting"
            git diff --name-only
            echo "::endgroup::"
            echo "::group::Full diff"
            git diff
            echo "::endgroup::"
            exit 1
          fi
          echo "All files formatted correctly"

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: List available schemes
        run: xcodebuild -project Ditto.xcodeproj -list

      - name: Build Ditto
        run: |
          xcodebuild build \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Tests
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: List available simulators
        run: xcrun simctl list devices available | grep -i iphone | head -20

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/build_output.log | tail -30

      - name: Show build errors
        if: failure()
        run: |
          grep -i 'error' /tmp/build_output.log | grep -v 'warning:' | tail -40 | while IFS= read -r line; do
            echo "::error::BUILD: $line"
          done

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee /tmp/test_output.log | tail -30

      - name: Show test errors
        if: failure()
        run: |
          grep -i 'error\|failed\|failure' /tmp/test_output.log | tail -40 | while IFS= read -r line; do
            echo "::error::TEST: $line"
          done

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7
