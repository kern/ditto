name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  swiftformat:
    name: SwiftFormat
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftFormat
        run: brew install swiftformat

      - name: Run SwiftFormat
        run: swiftformat . --verbose 2>&1 | tail -100

      - name: Check for changes
        run: |
          if ! git diff --quiet; then
            echo "::group::Files that need formatting"
            git diff --name-only
            echo "::endgroup::"
            echo "::group::Full diff"
            git diff
            echo "::endgroup::"
            exit 1
          fi
          echo "All files formatted correctly"

  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Build Ditto
        run: |
          xcodebuild build \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO

  test:
    name: Tests
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/build_output.log | tail -30

      - name: Show build errors
        if: failure()
        run: |
          grep -i 'error' /tmp/build_output.log | grep -v 'warning:' | tail -40 | while IFS= read -r line; do
            echo "::error::BUILD: $line"
          done

      - name: Run unit tests with coverage
        timeout-minutes: 10
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:DittoTests \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            2>&1 | tee /tmp/test_output.log | tail -30

      - name: Show test errors
        if: failure()
        run: |
          grep -i 'error\|failed\|failure' /tmp/test_output.log | tail -40 | while IFS= read -r line; do
            echo "::error::TEST: $line"
          done

      - name: Generate coverage report
        if: always()
        run: |
          if [ -d TestResults.xcresult ]; then
            echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            xcrun xccov view --report TestResults.xcresult 2>/dev/null | head -60 >> $GITHUB_STEP_SUMMARY || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo "### Coverage Details"
            xcrun xccov view --report TestResults.xcresult 2>/dev/null || echo "No coverage data"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults.xcresult
          retention-days: 7

  ui-test:
    name: UI Tests
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Boot simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}')
          if [ -n "$DEVICE_ID" ]; then
            xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          fi

      - name: Build for UI testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tee /tmp/ui_build_output.log | tail -30

      - name: Run UI tests
        timeout-minutes: 10
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Ditto.xcodeproj \
            -scheme Ditto \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -only-testing:DittoUITests \
            -resultBundlePath UITestResults.xcresult \
            2>&1 | tee /tmp/ui_test_output.log | tail -30

      - name: Show UI test output
        if: always()
        run: |
          echo "=== Last 80 lines of UI test output ==="
          tail -80 /tmp/ui_test_output.log || true
          echo ""
          echo "=== Errors and failures ==="
          grep -i 'error\|failed\|failure\|assertion' /tmp/ui_test_output.log | tail -40 | while IFS= read -r line; do
            echo "::error::UI TEST: $line"
          done

      - name: Upload UI test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 7
